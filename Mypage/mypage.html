<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Profile Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        /* Navigation */
        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* Container */
        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        /* Profile Image */
        .profile-img {
            width: 150px;
            border-radius: 50%;
            display: block;
            margin: 20px auto;
            border: 3px solid #333;
        }

        /* Sections */
        section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background-color: #333;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        /* Form */
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        button {
            background-color: #333;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }
    </style>
</head>

<body>

<!-- Navigation -->
<nav>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
</nav>

<div class="container">

    <!-- Profile Image (Clickable) -->
    <a href="https://www.facebook.com/share/1BnnrUxcn5/" target="Facebook">
        <img src="myprofile.jfif" alt="Profile Picture" class="profile-img">
    </a>

    <!-- About Section -->
    <section id="about">
        <h2>About Me</h2>
        <p>
            Hi! My name is <b>Lagumbay NeilCharles T.</b> I am a student who is learning web development.
            I enjoy coding, exploring technology, and improving my programming skills.
        </p>
    </section>

    <!-- Skills Table -->
    <section id="skills">
        <h2>Skills</h2>
        <table>
            <tr>
                <th>Skill</th>
                <th>Level</th>
            </tr>
            <tr>
                <td>HTML</td>
                <td>Intermediate</td>
            </tr>
            <tr>
                <td>CSS</td>
                <td>Basic</td>
            </tr>
            <tr>
                <td>Python</td>
                <td>Basic</td>
            </tr>
        </table>
    </section>

    <!-- Contact Form -->
    <section id="contact">
        <h2>Contact Me</h2>

        <form onsubmit="return validateForm()">
            <label>Name:</label>
            <input type="text" id="name" required>

            <label>Email:</label>
            <input type="email" id="email" required>

            <label>Message:</label>
            <textarea id="message" rows="5" required></textarea>

            <button type="submit">Send</button>
        </form>
    </section>

</div>

<!-- Simple Form Validation -->
<script>
    function validateForm() {
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let message = document.getElementById("message").value;

        if (name === "" || email === "" || message === "") {
            alert("Please fill out all fields!");
            return false;
        }

        alert("Message sent successfully!");
        return true;
    }
</script>

</body>
</html>
